name: Daily Pipeline

on:
  schedule:
    - cron: "0 8 * * *" # 8am UTC daily
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Ingest new videos for active curators
        run: bun run pipeline:ingest
      - name: Extract mentions from new videos
        run: bun run pipeline:extract
      - name: Resolve mentions against TMDB
        run: bun run pipeline:resolve
      - name: Analyze audience comments
        run: bun run pipeline:comments
      - name: Sync IMDb/TMDB ratings
        run: bun run ratings:sync
